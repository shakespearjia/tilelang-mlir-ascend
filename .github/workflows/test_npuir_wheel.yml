name: Test NPUIR Wheel

on:
  workflow_call:
    inputs:
      checkout-ref:
        description: "Git ref to checkout (e.g. refs/pull/123/merge or refs/tags/v1.0.0)"
        type: string
        required: true
      report-name:
        description: "Name for the test report artifact"
        type: string
        required: true
      wheel-artifact:
        description: "Name of the wheel artifact to download"
        type: string
        default: "tilelang-npuir-py3.11-arm64"

jobs:
  test:
    runs-on: linux-aarch64-a3-2
    container:
      image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:9.1.0-beta.1-a3-ubuntu22.04-py3.11
    timeout-minutes: 120
    env:
      UV_INDEX_URL: "http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple"
      UV_EXTRA_INDEX_URL: "http://cache-service.nginx-pypi-cache.svc.cluster.local/whl/cpu https://repo.huaweicloud.com/ascend/repos/pypi"
      UV_INDEX_STRATEGY: "unsafe-best-match"
      UV_INSECURE_HOST: "cache-service.nginx-pypi-cache.svc.cluster.local"
      UV_HTTP_TIMEOUT: 120
      UV_NO_CACHE: 1
      UV_SYSTEM_PYTHON: 1

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.checkout-ref }}
        fetch-depth: 1

    - name: Download arm64 wheel
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.wheel-artifact }}
        path: dist/

    - name: Install tilelang and test dependencies
      run: |
        CACHING_URL="cache-service.nginx-pypi-cache.svc.cluster.local"
        sed -Ei "s@(ports|archive).ubuntu.com@${CACHING_URL}:8081@g" /etc/apt/sources.list
        pip config set global.index-url http://${CACHING_URL}/pypi/simple
        pip config set global.trusted-host "${CACHING_URL}"
        pip install uv
        uv pip install torch==2.7.1
        uv pip install torch-npu==2.7.1
        uv pip install dist/*.whl
        uv pip install pytest pytest-xdist pytest-html numpy einops

    - name: Install clang
      run: |
        apt-get update && apt-get install -y clang

    - name: Prepare npuir test workspace
      run: |
        mkdir -p testing/npuir/output
        if [ -d tilelang ] && [ ! -d _tilelang_src ]; then
          mv tilelang _tilelang_src
        fi

    - name: Run npuir examples (python scripts)
      env:
        TILELANG_CLEAR_CACHE: "1"
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p testing/npuir/output/examples
        python examples/run_all.py --sequential 2>&1 | tee testing/npuir/output/examples/run_all.log

    - name: Run npuir tests
      env:
        TILELANG_CLEAR_CACHE: "1"
      run: |
        python -m pytest -v testing/npuir/*_ops -n 2 \
          --html=testing/npuir/output/report.html --self-contained-html \
          --junitxml=testing/npuir/output/junit.xml

    - name: Upload test report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.report-name }}
        path: testing/npuir/output/
